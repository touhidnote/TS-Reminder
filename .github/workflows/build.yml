name: Flutter Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'

      - name: Install dependencies
        run: flutter pub get
        working-directory: ts_reminder

      - name: Build APK
        run: flutter build apk --debug
        working-directory: ts_reminder
