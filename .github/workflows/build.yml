name: ts_reminder
description: A study progress and reminder app.
publish_to: 'none'

# The following defines the version and build number for your application.
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 👉 THE FIX: This is the modern version that supports the new Android namespace
  flutter_local_notifications: ^17.0.0

  # ⚠️ Add any other plugins you were using right below here:
  # shared_preferences: ^2.2.0
  # timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  # 👉 This correctly links the sounds folder from your file tree so notifications can use them
  assets:
    - assets/sounds/
    
