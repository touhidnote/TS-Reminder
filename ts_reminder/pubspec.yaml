name: ts_reminder
description: "A simple reminder app with notifications and sounds."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # Packages for reminders and sounds
  flutter_local_notifications: ^14.0.0
  just_audio: ^0.9.36
  timezone: ^0.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Assets for sounds and images
  assets:
    - assets/sounds/
    - assets/images/
