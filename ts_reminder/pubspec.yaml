name: ts_reminder
description: "TS Reminder & Study Timer App"

# Prevent publishing to pub.dev
publish_to: 'none'

# Version info
version: 1.0.0+1

environment:
  sdk: ^3.11.4
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.0.6
  shared_preferences: ^2.1.1
  flutter_local_notifications: ^13.0.0   # For reminder notifications
  intl: ^0.18.0  # For formatting dates and times

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    # Place your sound files here
    - assets/sounds/
    # Place your images/icons here
    - assets/images/
