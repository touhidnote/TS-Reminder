name: ts_reminder
description: A study progress and reminder app.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # All the packages your main.dart needs:
  flutter_local_notifications: ^17.0.0
  provider: ^6.1.2
  shared_preferences: ^2.2.3
  just_audio: ^0.9.36

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/sounds/
    
